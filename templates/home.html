<html>
<head>
    <title>FWI Prediction</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 350px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login h1 {
            margin-top: 60px;   
            margin-bottom: 20px;
            color: #2a5298;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #2a5298;
            box-shadow: 0 0 5px rgba(42,82,152,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #2a5298;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #1e3c72;
        }

        h2 {
            margin-top: 20px;
            color: #1e3c72;
            font-size: 18px;
        }
    </style>
</head>

<body>

<div class="login">
<h1>FWI Prediction</h1>

<form action="{{ url_for('predict_datapoint')}}" method="post">

<input type="text" name="Temperature" placeholder="Temperature" required="required" />
<input type="text" name="RH" placeholder="Relative Humidity" required="required" />
<input type="text" name="Ws" placeholder="Wind Speed" required="required" />
<input type="text" name="Rain" placeholder="Rain" required="required" />
<input type="text" name="FFMC" placeholder="FFMC" required="required" />
<input type="text" name="DMC" placeholder="DMC" required="required" />
<input type="text" name="ISI" placeholder="ISI" required="required" />
<input type="text" name="classes" placeholder="Classes" required="required" />
<input type="text" name="Region" placeholder="Region" required="required" />

<button type="submit" class="btn btn-primary btn block btn-large">Predict</button>

</form>

<h2>
THE FWI prediction is {{results}}
</h2>   

</div>

</body>
</html>
